name: Build Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '22'

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🔍 Type check
        run: pnpm --filter @repo/app exec tsc --noEmit
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
          GITHUB_INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}

  build:
    name: Build & Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Next.js app
        run: pnpm build
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
          GITHUB_INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}

      - name: ✅ Verify build output
        run: |
          echo "Checking build artifacts..."
          test -d apps/app/.next && echo "✓ .next directory exists" || (echo "✗ .next directory missing" && exit 1)
          test -f apps/app/.next/BUILD_ID && echo "✓ BUILD_ID exists" || (echo "✗ BUILD_ID missing" && exit 1)
          test -d apps/app/.next/standalone && echo "✓ standalone output exists" || (echo "✗ standalone output missing" && exit 1)
          echo "Build verification passed!"

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/app/.next/standalone
            apps/app/.next/static
            apps/app/public
            apps/app/src/contents
            packages
            Dockerfile
            podman-compose.yml
          retention-days: 1
