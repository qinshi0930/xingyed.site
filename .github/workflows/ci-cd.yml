name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  # 注意：不使用 paths-ignore，确保 tag 推送 100% 触发
  # 注意：暂时移除 workflow_dispatch，后续改造 manual-deploy 时再加

permissions:
  contents: write    # release job 创建 Release 需要
  packages: write    # docker-publish job 推送镜像需要

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Job 1: 代码质量检查 (PR + Push Main + Tag)
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🔍 Type check
        run: pnpm --filter @repo/app exec tsc --noEmit
        # 注意：不传递 GITHUB_APP_* secrets
        # Type check 不需要实际调用 API
        # 且 Fork PR 无法访问 secrets

  # ============================================================
  # Job 2: 构建应用 (Push Main + Tag，PR 不触发)
  # ============================================================
  build:
    name: Build
    needs: code-quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Next.js app
        run: pnpm build
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
          GITHUB_INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}

      - name: ✅ Verify build output
        run: |
          echo "Checking build artifacts..."
          test -d apps/app/.next && echo "✓ .next directory exists" || (echo "✗ .next directory missing" && exit 1)
          test -f apps/app/.next/BUILD_ID && echo "✓ BUILD_ID exists" || (echo "✗ BUILD_ID missing" && exit 1)
          test -d apps/app/.next/standalone && echo "✓ standalone output exists" || (echo "✗ standalone output missing" && exit 1)
          echo "Build verification passed!"

      - name: 🔗 Resolve symlinks for pnpm
        run: |
          echo "解析 pnpm 符号链接，确保依赖完整..."
          # 备份原始目录
          mv apps/app/.next/standalone apps/app/.next/standalone-original
          
          # 移除断裂的符号链接（Next.js standalone 输出的已知问题）
          BROKEN_LINKS=$(find apps/app/.next/standalone-original -xtype l 2>/dev/null | wc -l)
          if [ "$BROKEN_LINKS" -gt 0 ]; then
            echo "⚠️  发现 $BROKEN_LINKS 个断裂的符号链接，正在移除..."
            find apps/app/.next/standalone-original -xtype l -delete 2>/dev/null
          fi
          
          # 复制并解析所有符号链接（-L 参数）
          cp -aL apps/app/.next/standalone-original apps/app/.next/standalone
          rm -rf apps/app/.next/standalone-original
          
          # 重要：临时重命名 .gitignore
          # upload-artifact@v4 会读取 .gitignore 并跳过 node_modules
          # 这导致 standalone/node_modules 中的依赖没有被上传
          mv .gitignore .gitignore.backup 2>/dev/null || true
          
          echo "✓ 符号链接已解析"
          echo "📊 产物大小: $(du -sh apps/app/.next/standalone | cut -f1)"
          echo "📁 文件数量: $(find apps/app/.next/standalone -type f | wc -l)"
          echo ""
          echo "🔍 调试信息:"
          echo "  - .gitignore 状态: $(test -f .gitignore && echo '存在' || echo '已重命名')"
          echo "  - .gitignore.backup 状态: $(test -f .gitignore.backup && echo '存在' || echo '不存在')"
          echo "  - standalone/node_modules 状态: $(test -d apps/app/.next/standalone/node_modules && echo '存在' || echo '不存在')"
          if [ -d apps/app/.next/standalone/node_modules ]; then
            echo "  - standalone/node_modules 大小: $(du -sh apps/app/.next/standalone/node_modules | cut -f1)"
            echo "  - standalone/node_modules 文件数: $(find apps/app/.next/standalone/node_modules -type f | wc -l)"
          fi

      - name: 🔍 Debug .gitignore status
        run: |
          echo "=== Upload-Artifact 前检查 ==="
          echo "当前目录: $(pwd)"
          echo "工作目录内容:"
          ls -la | grep -E "(gitignore|\.next)" || true
          echo ""
          echo ".gitignore 文件状态:"
          if [ -f .gitignore ]; then
            echo "  ❌ .gitignore 仍然存在！"
            echo "  文件大小: $(wc -c < .gitignore) bytes"
            echo "  前5行内容:"
            head -5 .gitignore
          else
            echo "  ✅ .gitignore 已重命名"
          fi
          echo ""
          if [ -f .gitignore.backup ]; then
            echo ".gitignore.backup 存在"
          fi
          echo ""
          echo "standalone/node_modules 状态:"
          if [ -d apps/app/.next/standalone/node_modules ]; then
            echo "  ✅ 存在"
            echo "  大小: $(du -sh apps/app/.next/standalone/node_modules | cut -f1)"
          else
            echo "  ❌ 不存在"
          fi

      - name: 📦 Upload build artifact
        run: |
          echo "手动打包 artifact..."
          # 创建临时目录
          mkdir -p /tmp/artifact-build
          
          # 复制所有需要的文件
          cp -r apps/app/.next/standalone /tmp/artifact-build/
          cp -r apps/app/.next/static /tmp/artifact-build/
          cp -r apps/app/public /tmp/artifact-build/
          cp -r apps/app/src/contents /tmp/artifact-build/
          cp -r packages /tmp/artifact-build/
          cp Dockerfile /tmp/artifact-build/
          cp podman-compose.yml /tmp/artifact-build/
          
          # 创建 zip 文件
          cd /tmp/artifact-build
          zip -r /tmp/build-output.zip .
          
          echo "✓ 打包完成"
          echo "📦 包大小: $(du -sh /tmp/build-output.zip | cut -f1)"
          echo "📁 包内文件数: $(unzip -l /tmp/build-output.zip | tail -1 | awk '{print $1}')"
          
          # 移动回工作目录（需要回到原目录）
          cd $GITHUB_WORKSPACE
          mv /tmp/build-output.zip ./build-output.zip
          echo "✓ zip 文件已移动到工作目录"
          ls -lh ./build-output.zip

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.zip
          retention-days: 7

      - name: 🔄 Restore .gitignore
        run: |
          echo "恢复 .gitignore 文件..."
          mv .gitignore.backup .gitignore 2>/dev/null || true
          echo "✓ .gitignore 已恢复"

  # ============================================================
  # Job 3: 创建 Release (仅 Tag)
  # ============================================================
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          echo "📁 Downloaded artifact structure:"
          find . -maxdepth 4 -type d | head -50
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -d "apps/app/.next/static" || (echo "✗ static 缺失" && exit 1)
          test -d "apps/app/public" || (echo "✗ public 缺失" && exit 1)
          test -d "apps/app/src/contents" || (echo "✗ contents 缺失" && exit 1)
          test -d "packages" || (echo "✗ packages 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          test -f "podman-compose.yml" || (echo "✗ podman-compose.yml 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 📦 Compress artifact
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT_NAME="xingyed-site-${VERSION}.zip"
          echo "Compressing artifact for version: ${VERSION}"
          
          # 直接压缩整个目录（保持 monorepo 路径结构）
          zip -r "${ARTIFACT_NAME}" .
          
          # 验证
          echo "✓ Artifact compressed: ${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          
          # 显示产物内容
          echo "📦 Artifact structure:"
          unzip -l "${ARTIFACT_NAME}" | head -40

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: xingyed-site-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 4: 发布 Docker 镜像 (仅 Tag)
  # ============================================================
  docker-publish:
    name: Publish Docker Image
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
