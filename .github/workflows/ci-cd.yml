name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  # 注意：不使用 paths-ignore，确保 tag 推送 100% 触发
  # 注意：暂时移除 workflow_dispatch，后续改造 manual-deploy 时再加

permissions:
  contents: write    # release job 创建 Release 需要
  packages: write    # docker-publish job 推送镜像需要

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Job 1: 代码质量检查 (PR + Push Main + Tag)
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      - name: 🔍 Type check
        run: pnpm --filter @repo/app exec tsc --noEmit
        # 注意：不传递 GITHUB_APP_* secrets
        # Type check 不需要实际调用 API
        # 且 Fork PR 无法访问 secrets

  # ============================================================
  # Job 2: 构建应用 (Push Main + Tag，PR 不触发)
  # ============================================================
  build:
    name: Build
    needs: code-quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Next.js app
        run: pnpm build
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
          GITHUB_INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}

      - name: ✅ Verify build output
        run: |
          echo "Checking build artifacts..."
          test -d apps/app/.next && echo "✓ .next directory exists" || (echo "✗ .next directory missing" && exit 1)
          test -f apps/app/.next/BUILD_ID && echo "✓ BUILD_ID exists" || (echo "✗ BUILD_ID missing" && exit 1)
          test -d apps/app/.next/standalone && echo "✓ standalone output exists" || (echo "✗ standalone output missing" && exit 1)
          echo "Build verification passed!"

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/app/.next/standalone
            apps/app/.next/static
            apps/app/public
            apps/app/src/contents
            packages
            Dockerfile
            podman-compose.yml
          retention-days: 7
          # 重要：pnpm 使用符号链接管理依赖，必须跟随符号链接
          # 否则 standalone/node_modules 中的依赖会丢失
          follow-symlinks: true

  # ============================================================
  # Job 3: 创建 Release (仅 Tag)
  # ============================================================
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          echo "📁 Downloaded artifact structure:"
          find . -maxdepth 4 -type d | head -50
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -d "apps/app/.next/static" || (echo "✗ static 缺失" && exit 1)
          test -d "apps/app/public" || (echo "✗ public 缺失" && exit 1)
          test -d "apps/app/src/contents" || (echo "✗ contents 缺失" && exit 1)
          test -d "packages" || (echo "✗ packages 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          test -f "podman-compose.yml" || (echo "✗ podman-compose.yml 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 📦 Compress artifact
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT_NAME="xingyed-site-${VERSION}.zip"
          echo "Compressing artifact for version: ${VERSION}"
          
          # 直接压缩整个目录（保持 monorepo 路径结构）
          zip -r "${ARTIFACT_NAME}" .
          
          # 验证
          echo "✓ Artifact compressed: ${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          
          # 显示产物内容
          echo "📦 Artifact structure:"
          unzip -l "${ARTIFACT_NAME}" | head -40

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: xingyed-site-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 4: 发布 Docker 镜像 (仅 Tag)
  # ============================================================
  docker-publish:
    name: Publish Docker Image
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
