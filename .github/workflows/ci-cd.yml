name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  # 注意：不使用 paths-ignore，确保 tag 推送 100% 触发
  # 注意：暂时移除 workflow_dispatch，后续改造 manual-deploy 时再加

permissions:
  contents: write    # release job 创建 Release 需要
  packages: write    # docker-publish job 推送镜像需要

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Job 1: 代码质量检查 (PR + Push Main + Tag)
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Cache bun dependencies
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Lint
        run: bun run lint

      - name: 🔍 Type check
        run: cd apps/app && bunx tsc --noEmit
        # 注意：不传递 GITHUB_APP_* secrets
        # Type check 不需要实际调用 API
        # 且 Fork PR 无法访问 secrets

  # ============================================================
  # Job 2: 构建应用 (Push Main + Tag，PR 不触发)
  # ============================================================
  build:
    name: Build
    needs: code-quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐿️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Cache bun dependencies
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Next.js app
        run: bun run build
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_PRIVATE_KEY_BASE64: ${{ secrets.PRIVATE_KEY_BASE64 }}
          GITHUB_INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}

      - name: ✅ Verify build output
        run: |
          echo "Checking build artifacts..."
          test -d apps/app/.next && echo "✓ .next directory exists" || (echo "✗ .next directory missing" && exit 1)
          test -f apps/app/.next/BUILD_ID && echo "✓ BUILD_ID exists" || (echo "✗ BUILD_ID missing" && exit 1)
          test -d apps/app/.next/standalone && echo "✓ standalone output exists" || (echo "✗ standalone output missing" && exit 1)
          echo "Build verification passed!"

      - name: 📦 Pack build artifact (preserve symlinks)
        run: |
          echo "Packing build artifact with tar.gz (preserves symlinks)..."
          mkdir -p /tmp/artifact-build
          
          # 复制需要打包的文件，保持 monorepo 目录结构
          # 注意：standalone 已包含必要的 packages（通过 transpilePackages）
          mkdir -p /tmp/artifact-build/apps/app/.next
          cp -a apps/app/.next/standalone /tmp/artifact-build/apps/app/.next/standalone
          cp -a apps/app/.next/static /tmp/artifact-build/apps/app/.next/static
          
          mkdir -p /tmp/artifact-build/apps/app/src
          cp -a apps/app/src/contents /tmp/artifact-build/apps/app/src/contents
          
          cp -a apps/app/public /tmp/artifact-build/apps/app/public
          cp Dockerfile /tmp/artifact-build/
          cp podman-compose.yml /tmp/artifact-build/
          
          # 使用 tar.gz 打包（默认保留符号链接）
          cd /tmp/artifact-build
          tar -czf /tmp/build-output.tar.gz .
          
          # 验证
          echo "✓ Artifact packed:"
          ls -lh /tmp/build-output.tar.gz
          echo "✓ Archive contents (first 30 lines):"
          tar -tzf /tmp/build-output.tar.gz | head -30
          
          # 移动到工作目录
          mv /tmp/build-output.tar.gz $GITHUB_WORKSPACE/

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.tar.gz
          retention-days: 7
          compression-level: 0  # 已压缩，不再二次压缩

  # ============================================================
  # Job 3: 创建 Release (仅 Tag)
  # ============================================================
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📦 Extract build artifact
        run: |
          echo "Extracting build artifact..."
          mkdir -p build-output
          tar -xzf build-output.tar.gz -C build-output
          rm build-output.tar.gz
          
          echo "✓ Extracted contents:"
          ls -la build-output/

      - name: 📁 Verify artifact structure
        run: |
          cd build-output
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -d "apps/app/.next/static" || (echo "✗ static 缺失" && exit 1)
          test -d "apps/app/public" || (echo "✗ public 缺失" && exit 1)
          test -d "apps/app/src/contents" || (echo "✗ contents 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          test -f "podman-compose.yml" || (echo "✗ podman-compose.yml 缺失" && exit 1)
          
          # 验证 standalone 中的 packages（已由 Next.js 自动包含）
          test -d "apps/app/.next/standalone/packages" || echo "⚠ standalone/packages 不存在（可能不需要）"
          
          echo "✓ 产物结构验证通过"

      - name: 📦 Create Release tar.gz
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT_NAME="xingyed-site-${VERSION}.tar.gz"
          echo "Creating Release tar.gz for version: ${VERSION}"
          
          # 直接使用已打包的 tar.gz（符号链接已保留）
          cd build-output
          tar -czf ../${ARTIFACT_NAME} .
          cd ..
          
          # 验证
          echo "✓ Release artifact created: ${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          echo "✓ Archive contents (first 20 lines):"
          tar -tzf "${ARTIFACT_NAME}" | head -20

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: xingyed-site-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 4: 发布 Docker 镜像 (仅 Tag)
  # ============================================================
  docker-publish:
    name: Publish Docker Image
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📦 Extract build artifact
        run: |
          echo "Extracting build artifact for Docker build..."
          mkdir -p docker-context
          tar -xzf build-output.tar.gz -C docker-context
          rm build-output.tar.gz
          
          echo "✓ Docker context prepared:"
          ls -la docker-context/
          echo "✓ Directory structure:"
          find docker-context -maxdepth 3 -type d | head -20

      - name: 📁 Verify artifact structure
        run: |
          cd docker-context
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
