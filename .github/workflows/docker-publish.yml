name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true
        id: download

      - name: 🔍 Check artifact availability
        if: steps.download.outcome == 'failure'
        run: |
          echo "::error::构建产物未找到！"
          echo "Artifact 'build-output' not found."
          echo ""
          echo "请确保在打 tag 之前："
          echo "1. 已将代码推送到 main 分支"
          echo "2. main 分支的 build-test workflow 已成功完成"
          echo ""
          echo "Please ensure:"
          echo "1. Code has been pushed to main branch"
          echo "2. build-test workflow has completed successfully"
          exit 1

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
