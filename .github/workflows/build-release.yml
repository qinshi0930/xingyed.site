name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '22'

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📦 Compress artifact
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT_NAME="xingyed-site-${VERSION}.zip"
          echo "Compressing artifact for version: ${VERSION}"
          
          # 调试：显示下载后的目录结构
          echo "📁 Downloaded artifact structure:"
          find . -maxdepth 4 -type d | head -50
          
          # 创建临时目录构建完整的产物结构
          RELEASE_DIR="${GITHUB_WORKSPACE}/release"
          mkdir -p "${RELEASE_DIR}"
          
          # 1. 复制 standalone 核心文件
          if [ -d "standalone" ]; then
            # 扁平化结构：standalone 直接在根目录
            cp -r standalone/* "${RELEASE_DIR}/"
          elif [ -d "apps/app/.next/standalone" ]; then
            # 完整路径结构
            cp -r apps/app/.next/standalone/* "${RELEASE_DIR}/"
          else
            echo "✗ standalone directory not found"
            exit 1
          fi
          
          # 2. 复制静态资源
          mkdir -p "${RELEASE_DIR}/apps/app/.next"
          if [ -d "static" ]; then
            cp -r static "${RELEASE_DIR}/apps/app/.next/static"
          elif [ -d "apps/app/.next/static" ]; then
            cp -r apps/app/.next/static "${RELEASE_DIR}/apps/app/.next/static"
          fi
          
          # 3. 复制 public 和 contents
          if [ -d "public" ]; then
            cp -r public "${RELEASE_DIR}/apps/app/public"
          elif [ -d "apps/app/public" ]; then
            cp -r apps/app/public "${RELEASE_DIR}/apps/app/public"
          fi
          
          if [ -d "contents" ]; then
            cp -r contents "${RELEASE_DIR}/apps/app/src/contents"
          elif [ -d "apps/app/src/contents" ]; then
            cp -r apps/app/src/contents "${RELEASE_DIR}/apps/app/src/contents"
          fi
          
          # 4. 压缩
          cd "${RELEASE_DIR}"
          zip -r "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}" .
          
          # 验证
          cd "${GITHUB_WORKSPACE}"
          echo "✓ Artifact compressed: ${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          
          # 显示产物内容
          echo "📦 Artifact structure:"
          unzip -l "${ARTIFACT_NAME}" | head -40

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: xingyed-site-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
