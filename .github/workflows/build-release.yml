name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true
        id: download

      - name: 🔍 Check artifact availability
        if: steps.download.outcome == 'failure'
        run: |
          echo "::error::构建产物未找到！"
          echo "Artifact 'build-output' not found."
          echo ""
          echo "请确保在打 tag 之前："
          echo "1. 已将代码推送到 main 分支"
          echo "2. main 分支的 build-test workflow 已成功完成"
          echo ""
          echo "Please ensure:"
          echo "1. Code has been pushed to main branch"
          echo "2. build-test workflow has completed successfully"
          exit 1

      - name: 📁 Verify artifact structure
        run: |
          echo "验证产物结构..."
          test -d "apps/app/.next/standalone" || (echo "✗ standalone 缺失" && exit 1)
          test -d "apps/app/.next/static" || (echo "✗ static 缺失" && exit 1)
          test -d "apps/app/public" || (echo "✗ public 缺失" && exit 1)
          test -d "apps/app/src/contents" || (echo "✗ contents 缺失" && exit 1)
          test -d "packages" || (echo "✗ packages 缺失" && exit 1)
          test -f "Dockerfile" || (echo "✗ Dockerfile 缺失" && exit 1)
          test -f "podman-compose.yml" || (echo "✗ podman-compose.yml 缺失" && exit 1)
          echo "✓ 产物结构验证通过"

      - name: 📦 Compress artifact
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT_NAME="xingyed-site-${VERSION}.zip"
          echo "Compressing artifact for version: ${VERSION}"
          
          # 显示下载后的目录结构
          echo "📁 Downloaded artifact structure:"
          find . -maxdepth 4 -type d | head -50
          
          # 直接压缩整个目录（保持 monorepo 路径结构）
          zip -r "${ARTIFACT_NAME}" .
          
          # 验证
          echo "✓ Artifact compressed: ${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          
          # 显示产物内容
          echo "📦 Artifact structure:"
          unzip -l "${ARTIFACT_NAME}" | head -40

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: xingyed-site-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
