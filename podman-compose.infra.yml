version: '3.8'

# 基础设施配置 - 仅包含 PostgreSQL 和 Redis
# 用于本地开发：应用在 IDE 中运行，连接容器化基础设施
# 数据持久化到 .infra-data 目录

services:
  redis:
    image: redis:alpine
    container_name: xingye-site-infra-redis
    ports:
      - "6379:6379"
    # 开发环境禁用 RDB 持久化，避免权限问题
    # 使用 --save "" 禁用快照，--appendonly no 禁用 AOF
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - infra-network

  postgres:
    image: postgres:alpine
    container_name: xingye-site-infra-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-master_db}
      - POSTGRES_USER=${POSTGRES_USER:-xingye}
      - PGDATA=/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xingye} -d ${POSTGRES_DB:-master_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra-network

networks:
  infra-network:
    driver: bridge
