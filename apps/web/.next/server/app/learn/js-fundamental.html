c/chunks/1991243015b6060e.js\",\"/_next/static/chunks/ca2e0062105a320d.js\",\"/_next/static/chunks/2b8830f178020240.js\",\"/_next/static/chunks/8810ca3a6f81ba57.js\",\"/_next/static/chunks/eb6bf73284bf7a70.js\",\"/_next/static/chunks/43c5d28727e0aba6.js\"],\"default\"]\n16:I[28532,[\"/_next/static/chunks/05a0749c8759e0b2.js\",\"/_next/static/chunks/d86a7ede9ed5985d.js\",\"/_next/static/chunks/5d82a702bb57e60f.js\",\"/_next/static/chunks/b27b12b558ffde28.js\",\"/_next/static/chunks/b80b75b01556bd07.js\",\"/_next/static/chunks/cec75e33c9ecca5e.js\",\"/_next/static/chunks/1991243015b6060e.js\",\"/_next/static/chunks/ca2e0062105a320d.js\",\"/_next/static/chunks/2b8830f178020240.js\",\"/_next/static/chunks/8810ca3a6f81ba57.js\",\"/_next/static/chunks/eb6bf73284bf7a70.js\",\"/_next/static/chunks/43c5d28727e0aba6.js\"],\"default\"]\n17:T533,"])</script><script>self.__next_f.push([1,"JavaScript (JS) is a versatile programming language utilized for developing dynamic interactions in webpages, games, applications, and servers. It originated as part of Netscape, a web browser developed in the 1990s, and has since gained immense popularity as one of the most widely-used programming languages.\n\nInitially, JS was created to breathe life into webpages and was limited to running within browsers. However, it has now evolved to run on any device with JavaScript engine support.\n\nJavaScript provides a range of standard objects such as Array, Date, and Math, as well as operators, control structures, and statements. Furthermore, there are extended versions of JavaScript known as Client-side JavaScript and Server-side JavaScript.\n\n* Client-side JavaScript empowers developers to enhance and manipulate web pages within client browsers. It facilitates interactive responses to user events, including mouse clicks, form input, and page navigation.\n\n* Server-side JavaScript enables seamless interaction with servers, databases, and file systems.\n\nJavaScript is an interpreted language, where each line of code is interpreted and executed by an interpreter. Modern browsers leverage Just-In-Time (JIT) compilation technology to transform JavaScript into executable bytecode, optimizing its performance and efficiency.\n"])</script><script>self.__next_f.push([1,"18:T57a,"])</script><script>self.__next_f.push([1,"This is the initial lesson on first chapter, we're going to delve into the fundamentals of programming and acquaint ourselves with the JavaScript language.\n\nProgramming, in essence, involves crafting code. Much like how a book comprises chapters, paragraphs, sentences, and words, a program can be dissected into increasingly smaller components.\n\nAt this stage, one of the most pivotal components is a statement. Think of a statement as akin to a sentence in a book. While it holds its own structure and purpose, without the context of the surrounding statements, it may not convey much meaning.\n\nA statement is more informally (and frequently) referred to as a line of code. This is because statements are typically written on separate lines. Consequently, programs are typically read from top to bottom, left to right. You might be curious about what code (also known as source code) entails. It's actually quite a broad term, encompassing both the entirety of the program and its smallest elements. Hence, a line of code is essentially one line of your program.\n\nTo illustrate, consider this straightforward example:\n\n```\nlet hello = \"Hello\";\nlet world = \"World\";\n\n\n// Message equals \"Hello World\"\nlet message = hello + \" \" + world;\n```\n\nThis code can be executed by another program known as an interpreter. The interpreter reads the code and carries out all the statements in the correct sequence.\n"])</script><script>self.__next_f.push([1,"19:T5db,"])</script><script>self.__next_f.push([1,"Comments serve as non-executable statements that provide annotations or small descriptions of code in order to enhance code readability and understanding for other programmers. They are also useful for temporarily disabling code without impacting the program's flow.\n\nIn JavaScript, comments can be written in two different forms:\n\n1. Single-line comments: They begin with two forward slashes (//) and extend until the end of the line. Any text following the slashes is disregarded by the JavaScript interpreter. For instance:\n\n```\n// This is a comment, it will be ignored by the interpreter\nlet a = \"this is a variable defined in a statement\";\n```\n\n2. Multi-line comments, also known as block comments, are denoted by a forward slash and an asterisk (/) to start, and an asterisk and a forward slash (/) to end. The JavaScript interpreter disregards any content within these markers. This allows for commenting out multiple lines or writing longer explanations. Here's an example:\n\n```\n/*\nThis is a multi-line comment, it will be ignored by the interpreter\n*/\nlet a = \"this is a variable defined in a statement\";\n```\n\nComments play a crucial role in maintaining code quality, fostering collaboration, and facilitating the debugging process. By offering context and explanations for different sections of code, comments greatly enhance code comprehension in the long run. Including comments is widely recognized as a beneficial practice that contributes to overall code clarity and maintainability.\n"])</script><script>self.__next_f.push([1,"1a:T405,"])</script><script>self.__next_f.push([1,"In ES6, there are three ways to declare variables: `var`, `const`, and `let`.\n\nThe var keyword is used to declare variables that have either global scope or function scope. Regardless of block scope, variables declared with var are accessible throughout the entire function. For example:\n\n```\nfunction varTest() {\n    var x = 1;\n    if (true) {\n        var x = 2; // same variable\n        console.log(x); // 2\n    }\n    console.log(x); // 2\n}\n```\n\nThe let keyword, introduced in ES6, allows you to declare variables that are scoped to the block, statement, or expression in which they are used. This means that variables declared with let are only accessible within the specific block. For example:\n\n```\nfunction letTest() {\n    let x = 1;\n    if (true) {\n        let x = 2;\n        console.log(x); // 2\n    }\n    console.log(x); // 1\n}\n```\n\nOn the other hand, variables declared with the const keyword are immutable, meaning they cannot be reassigned once they are defined. For instance:\n\n```\nconst x = \"hi!\";\nx = \"bye\"; //\n```\n"])</script><script>self.__next_f.push([1,"1b:T7a6,"])</script><script>self.__next_f.push([1,"Computers possess a remarkable ability to handle more than just simple numbers. This is where the concept of variable types becomes crucial. Variables can assume various types, and different programming languages support distinct sets.\n\nHere are some of the most commonly used types:\n\n* `Number`: These can be whole numbers (e.g., 1, -5, 100) or decimal values (e.g., 3.14, -2.5, 0.01). Notably, in JavaScript, there's no distinct separation between integers and decimal numbers; they are all treated as numbers.\n\n* `String`: Strings represent sequences of characters, and they can be denoted by either single quotes (e.g., 'hello') or double quotes (e.g., \"world\").\n\n* `Boolean`: Booleans stand for a true or false value, and they are typically represented as true or false, without the need for quotes.\n\n* `Null`: This type signifies a null value, essentially meaning \"no value at all.\" It is denoted as null, without quotes.\n\n* `Undefined`: This type characterizes a value that hasn't been set yet. If a variable has been declared but hasn't been assigned a value, it falls under this category.\n\n* `Object`: Objects are collections of properties, each having a name and a corresponding value. You can establish an object using curly braces ({}), assigning properties through name-value pairs.\n\n* `Array`: An array is a unique form of an object that can contain a series of elements. To create an array, you use square brackets (\\[]), populating it with a list of values.\n\n* `Function`: Functions are blocks of code that can be defined and subsequently invoked by name. They can take arguments as inputs and return a value as output. You form a function using the function keyword.\n\nJavaScript operates as a \"loosely typed\" language, meaning you're not required to explicitly declare the data type of variables. Simply using the var keyword to declare a variable is sufficient. The interpreter deduces the data type from the context and the use of quotes.\n"])</script><script>self.__next_f.push([1,"1c:T4ac,"])</script><script>self.__next_f.push([1,"The `typeof` operator is a powerful tool used to determine the data type of a variable.\n\nFor instance:\n\n* `typeof \"John\"` will return \"string\".\n* `typeof 3.14` will return \"number\".\n* `typeof NaN` will also return \"number\".\n* `typeof false` will return \"boolean\".\n* `typeof [1,2,3,4]` will return \"object\".\n* `typeof {name:'John', age:34}` will return \"object\".\n* `typeof new Date()` will return \"object\".\n* `typeof function () {}` will return \"function\".\n* `typeof myCar` will return \"undefined\".\n* `typeof null` will return \"object\".\n\nJavaScript's data types can be divided into two main categories based on the values they hold:\n\n**Data types that can contain values:**\n\n* `string`\n* `number`\n* `boolean`\n* `object`\n* `function`\n\nJavaScript provides several object types including `Object`, `Date`, `Array`, `String`, `Number`, and `Boolean`.\n\n**Data types that cannot contain values:**\n\n* `null`\n* `undefined`\n\nA primitive data value is a straightforward value with no extra properties or methods and is not an object. They are unchangeable, meaning they can't be modified. There are seven primitive data types:\n\n* `string`\n* `number`\n* `bigint`\n* `boolean`\n* `undefined`\n* `symbol`\n* `null`\n"])</script><script>self.__next_f.push([1,"1d:T403,"])</script><script>self.__next_f.push([1,"When we write programs, it's common to check if variables are equal to other variables. This is where the equality operator comes into play. The most basic equality operator is `==`. It goes to great lengths to establish if two variables are equal, even if they aren't the same type.\n\nFor instance, consider the following:\n\n```\nlet foo = 50;\nlet bar = 50;\nlet baz = \"50\";\nlet qux = \"learn\";\n```\n\n```\nfoo == bar // Evaluates to true\nbaz == qux // Evaluates to false\nfoo == baz // Also evaluates to true, despite different types\n```\n\nBehind the scenes, the `==` equality operator attempts to make its operands the same type before determining their equality. This is different from the `===` equality operator.\n\nThe `===` equality operator insists that two variables are only equal if they are of the same type and hold the same value. Given our earlier assumptions, this means `foo === bar` still evaluates to `true`. However, `foo === baz` will now evaluate to `false`. Similarly, baz `===` qux will still evaluate to `false`.\n"])</script><script>self.__next_f.push([1,"1e:T7d5,"])</script><script>self.__next_f.push([1,"Performing mathematical operations on numbers in JavaScript involves using fundamental operators such as:\n\n* **Addition Operator (+):** This operator combines two numbers. For example:\n\n```\nconsole.log(3 + 4); // 7\nconsole.log(1 + (-5)); // -4\n```\n\n* **Subtraction Operator (-):** This operator subtracts one number from another:\n\n```\nconsole.log(8 - 3); // 5\nconsole.log(5 - (-2)); // 7\n```\n\n* **Multiplication Operator (\\*):** This operator multiplies two numbers:\n\n```\nconsole.log(2 * 3); // 6\nconsole.log(2 * (-4)); // -8\n```\n\n* **Division Operator (/):** This operator divides one number by another:\n\n```\nconsole.log(10 / 2); // 5\nconsole.log(6 / (-3)); // -2\n```\n\n* **Remainder Operator (%):** This operator gives the remainder of a division:\n\n```\nconsole.log(11 % 3); // 2\nconsole.log(15 % 4); // 3\nconsole.log(20 % 5); // 0\n```\n\nThe JavaScript interpreter reads expressions from left to right. You can use parentheses to group and prioritize operations, just like in math: `c = (a / b) + d`.\n\nIn JavaScript, the + operator is used for both addition and concatenation. When you use it with numbers, it adds them; with strings, it concatenates them.\n\nThe term NaN is a special value that indicates a result is \"Not a Number\". This happens when we try to do math with something that isn't a number, like a non-numeric string:\n\n```\nlet x = 100 / \"ten\"; // x will be NaN\n```\n\nThe `parseInt` method converts a value to a string and returns the first integer:\n\n```\nparseInt(\"15\"); // 15\nparseInt(\"15.25\"); // 15\nparseInt(\"15.75\"); // 15\nparseInt(\"22 33 44\"); // 22\nparseInt(\" 80 \"); // 80\nparseInt(\"50 years\"); // 50\nparseInt(\"She is 30\"); // NaN\n```\n\nIn JavaScript, if a calculation results in a number larger than the maximum possible value, it returns Infinity:\n\n```\nlet a = 1.7976931348623157E+10308; // a will be Infinity\n```\n\nAnd if a calculation results in a number smaller than the minimum possible value, it returns -Infinity:\n\n```\nlet b = -1.7976931348623157E+10308; // b will be -Infinity\n```\n"])</script><script>self.__next_f.push([1,"1f:T115d,"])</script><script>self.__next_f.push([1,"JavaScript offers a powerful tool for performing mathematical operations through the `Math` object. It's static, meaning you don't need to create an instance of it. You can directly use its methods and properties with `Math.property`.\n\nSome of the important properties include:\n\n* `Math.E` // returns Euler's number\n* `Math.PI` // returns PI\n* `Math.SQRT2` // returns the square root of 2\n* `Math.SQRT1_2` // returns the square root of 1/2\n* `Math.LN2` // returns the natural logarithm of 2\n* `Math.LN10` // returns the natural logarithm of 10\n* `Math.LOG2E` // returns base 2 logarithm of E\n* `Math.LOG10E` // returns base 10 logarithm of E\n\nHere are some examples of math methods:\n\n* `Math.pow(3, 2);` // 9\n* `Math.round(5.4);` // 5\n* `Math.ceil(5.1);` // 6\n* `Math.floor(5.9);` // 5\n* `Math.trunc(5.2);` // 5\n* `Math.sign(-5);` // -1\n* `Math.sqrt(25);` // 5\n* `Math.abs(-7.2);` // 7.2\n* `Math.sin(Math.PI / 2);` // 1 (the sine of 90 degrees)\n* `Math.cos(0);` // 1 (the cosine of 0 degrees)\n* `Math.min(10, 150, 30, 20, -8, -200);` // -200\n* `Math.max(10, 150, 30, 20, -8, -200);` // 150\n* `Math.random();` // A random number between 0 and 1\n* `Math.log(Math.E);` // 1\n* `Math.log2(8);` // 3\n* `Math.log10(1000);` // 3\n\nThese methods are accessed directly, and you provide the necessary arguments. For example, `Math.pow(2, 3)` returns 8, as it calculates 2 raised to the power of 3.\n\nHere's a quick reference for some common methods:\n\n| Method            | Description                                                               |\n| ----------------- | ------------------------------------------------------------------------- |\n| `abs(x)`          | Returns absolute value of x                                               |\n| `acos(x)`         | Returns arccosine of x, in radians                                        |\n| `acosh(x)`        | Returns hyperbolic arccosine of x                                         |\n| `asin(x) `        | Returns arcsine of x, in radians                                          |\n| `asinh(x)`        | Returns hyperbolic arcsine of x                                           |\n| `atan(x)`         | Returns arctangent of x as a numeric value between -PI/2 and PI/2 radians |\n| `atan2(y,x)`      | Returns arctangent of the quotient of its arguments                       |\n| `atanh(x)`        | Returns hyperbolic arctangent of x                                        |\n| `cbrt(x)`         | Returns cubic root of x                                                   |\n| `ceil(x)`         | Returns rounded upwards to the nearest integer of x                       |\n| `cos(x)`          | Returns cosine of x, in radians                                           |\n| `cosh(x)`         | Returns hyperbolic cosine of x                                            |\n| `exp(x)`          | Returns exponential value of x                                            |\n| `floor(x)`        | Returns round downwards to the nearest integer of x                       |\n| `log(x)`          | Returns natural logarithmetic of x                                        |\n| `max(x,y,z,...n)` | Returns number with the highest value                                     |\n| `min(x,y,z,...n)` | Returns number with the lowest value                                      |\n| `pow(x,y)`        | Returns value of x to the power of y                                      |\n| `random()`        | Returns number between 0 and 1                                            |\n| `round(x)`        | Rounds number to the nearest x                                            |\n| `sign(x)`         | Returns if x is negative, null or positive (-1,0,1)                       |\n| `sin(x)`          | Returns sine of x, in radians                                             |\n| `sinh(x)`         | Returns hyperbolic sine of x                                              |\n| `sqrt(x)`         | Returns square root of x                                                  |\n| `tan(x)`          | Returns tangent of an angle                                               |\n| `tanh(x)`         | Returns hyperbolic tangent of x                                           |\n| `trunc(x)`        | Returns integer part of a number (x)                                      |\n\nThese methods are accessed directly, and you provide the necessary arguments. For example, `Math.pow(2, 3)` returns 8, as it calculates 2 raised to the power of 3.\n"])</script><script>self.__next_f.push([1,"20:T973,"])</script><script>self.__next_f.push([1,"In JavaScript, the way operators are applied depends on their *precedence*. Multiplication `(*)` and division `(/)` take precedence over addition `(+)` and subtraction `(-)`.\n\n```\nlet x = 100 + 50 * 3; // Multiplication is done first, followed by addition. Result: 250\nlet y = (100 + 50) * 3; // Operations inside parentheses are computed first. Result: 450\nlet z = 100 / 50 * 3; // Operations with the same precedence are computed from left to right.\n```\n\nHere are some advanced math operators that you can use while writing programs:\n\n**Modulo operator (%):**\nThis operator returns the remainder of a division operation. For example:\n\n```\nconsole.log(10 % 3); // Result: 1\nconsole.log(11 % 3); // Result: 2\nconsole.log(12 % 3); // Result: 0\n```\n\n**Exponentiation operator (--):**\nThis operator raises a number to the power of another number. It's a newer operator and may not be supported in all browsers, so you may need to use the Math.pow function instead. For example:\n\n```\nconsole.log(2 ** 3); // Result: 8\nconsole.log(3 ** 2); // Result: 9\nconsole.log(4 ** 3); // Result: 64\n```\n\n**Increment operator (++):**\nThis operator increases a number by one. It can be used as a prefix (before the operand) or a postfix (after the operand). For example:\n\n```\nlet x = 1;\nx++; // x is now 2\n++x; // x is now 3\n```\n\n**Decrement operator (--):**\nThis operator decreases a number by one. It can be used as a prefix (before the operand) or a postfix (after the operand). For example:\n\n```\nlet y = 3;\ny--; // y is now 2\n--y; // y is now 1\n```\n\n**Math object:**\nThe Math object in JavaScript provides mathematical functions and constants. You can use its methods for advanced math operations like finding square roots, calculating sines, or generating random numbers. For example:\n\n```\nconsole.log(Math.sqrt(9)); // Result: 3\nconsole.log(Math.sin(0)); // Result: 0\nconsole.log(Math.random()); // A random number between 0 and 1\n```\n\nThese are just a few examples of the advanced math operators and functions available in JavaScript. There are many more you can use for complex math operations in your programs.\n\n### Understanding the Nullish Coalescing Operator '??'\n\nThe nullish coalescing operator returns the first argument if it's not null or undefined; otherwise, it returns the second one. It's written as two question marks `??.` The result of `x ?? y` is:\n\nIf `x` is defined, then `x`.\nIf `y` isn’t defined, then `y`.\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"div\",null,{\"className\":\"mb-10 mt-20 p-8 lg:mt-0  \",\"data-aos\":\"fade-up\",\"children\":[[\"$\",\"$L15\",null,{\"url\":\"/learn\"}],[[\"$\",\"h1\",null,{\"className\":\" text-2xl font-medium\",\"children\":\"JavasScript Fundamental\"}],[\"$\",\"p\",null,{\"className\":\"mb-6 border-b border-dashed border-neutral-600 pb-6 pt-2 text-neutral-600 dark:text-neutral-400\",\"children\":\"Master the fundamentals of programming in JavaScript.\"}]],[\"$\",\"$L16\",null,{\"sortedSubContents\":[{\"slug\":\"0-introduction\",\"frontMatter\":{\"id\":0,\"chapter_id\":0,\"chapter_title\":\"Chapter 0 : Intro\",\"title\":\"Introduction\",\"category\":\"JavaScript Fundamental\",\"language\":\"JavaScript\",\"difficulty\":\"Easy\",\"source\":null,\"cover_url\":\"/images/learn/javascript.svg\",\"source_url\":null,\"created_at\":\"2023-09-12\",\"updated_at\":\"2023-09-12\",\"is_playground\":false,\"is_comment\":false},\"content\":\"$17\"},{\"slug\":\"1-hello-world\",\"frontMatter\":{\"id\":1,\"chapter_id\":1,\"chapter_title\":\"Chapter 1 : Basics\",\"title\":\"Hello World\",\"category\":\"JavaScript Fundamental\",\"language\":\"JavaScript\",\"difficulty\":\"Easy\",\"source\":null,\"cover_url\":\"/images/learn/javascript.svg\",\"source_url\":null,\"created_at\":\"2023-09-12\",\"updated_at\":\"2023-09-12\",\"is_playground\":true,\"is_comment\":false},\"content\":\"$18\"},{\"slug\":\"2-comments\",\"frontMatter\":{\"id\":2,\"chapter_id\":1,\"chapter_title\":\"Ch .svg\",\"source_url\":null,\"created_at\":\"2023-09-15\",\"updated_at\":\"2023-09-15\",\"is_playground\":true,\"is_comment\":false},\"content\":\"$1d\"},{\"slug\":\"7-numbers\",\"frontMatter\":{\"id\":7,\"chapter_id\":2,\"chapter_title\":\"Chapter 2 : Numbers\",\"title\":\"Numbers\",\"category\":\"JavaScript Fundamental\",\"language\":\"JavaScript\",\"difficulty\":\"Easy\",\"source\":null,\"cover_url\":\"/images/learn/javascript.svg\",\"source_url\":null,\"created_at\":\"2023-09-15\",\"updated_at\":\"2023-09-15\",\"is_playground\":true,\"is_comment\":false},\"content\":\"In JavaScript, there's just **one type of number** – a 64-bit floating-point value. This aligns with Java's `double`. Unlike some other programming languages, **JavaScript doesn't have a separate integer type**. So, both 1 and 1.0 represent the same value.\\n\\nCreating a number is straightforward, similar to any other variable type. Just use the `var`, `let` or `const` keyword.\\n\\nYou can define numbers using constant values:\\n\\n```\\n// This is a float:\\nlet a = 3.5;\\n\\n// This is an integer:\\nlet b = 20;\\n```\\n\\nAlternatively, you can derive a number from the value of another variable:\\n\\n```\\nlet a = 4;\\nlet b = a;\\n```\\n\\nIn JavaScript, integers maintain precision up to 15 digits, with the maximum number being 17.\\n\\n```\\nlet a = 123456789012345;   // m will be 123456789012345\\nlet b = 12345678901234567;  // n will be 12345678901234567\\n```\\n\\nNumeric constants are recognized as hexadecimal if they are preceded by 0x.\\n\\n```\\nlet a = 0xAA; // This evaluates to 170\\n```\\n\"},{\"slug\":\"8-basic-operator\",\"frontMatter\":{\"id\":8,\"chapter_id\":2,\"chapter_title\":\"Chapter 2 : Numbers\",\"title\":\"Basic Operator\",\"category\":\"JavaScript Fundamental\",\"language\":\"JavaScript\",\"difficulty\":\"Easy\",\"source\":null,\"cover_url\":\"/images/learn/javascript.svg\",\"source_url\":null,\"created_at\":\"2023-09-16\",\"updated_at\":\"2023-09-16\",\"is_playground\":
