# UFW 防火墙配置示例
# 只允许 GitHub 的 IP 范围访问 webhook 端口

# GitHub Webhook IPs (需要定期更新)
# 参考: https://api.github.com/meta
ALLOW_GITHUB_WEBHOOKS="yes"

# 添加 GitHub IP 范围
# 注意：这些 IP 可能会变化，建议定期检查
ufw allow from 192.30.252.0/22 to any port 9000
ufw allow from 185.199.108.0/22 to any port 9000
ufw allow from 140.82.112.0/20 to any port 9000
ufw allow from 143.55.64.0/20 to any port 9000

# 或者使用 nftables（推荐）
# 见 webhook-nftables.conf
