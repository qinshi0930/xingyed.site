# nftables 防火墙配置示例
# 只允许 GitHub 的 IP 范围访问 webhook 端口

#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        
        # 允许已建立的连接
        ct state established,related accept
        
        # 允许 loopback
        iif lo accept
        
        # 允许 SSH
        tcp dport 22 accept
        
        # 允许 HTTP/HTTPS（如果你的应用需要）
        # tcp dport { 80, 443 } accept
        
        # 允许 webhook 端口（仅 GitHub IP）
        # GitHub Webhook IPs
        ip saddr 192.30.252.0/22 tcp dport 9000 accept
        ip saddr 185.199.108.0/22 tcp dport 9000 accept
        ip saddr 140.82.112.0/20 tcp dport 9000 accept
        ip saddr 143.55.64.0/20 tcp dport 9000 accept
        
        # 允许 ICMP (ping)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
    
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
    
    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# 使用方法：
# sudo nft -f /etc/nftables.conf
# 或
# sudo nft -f webhook-nftables.conf
