services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: xingye-site-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      app-network:
        aliases:
          - redis

  app:
    container_name: xingye-site-app
    # image: ${APP_IMAGE:-ghcr.io/qinshi0930/xingyed.site:latest}
    # 本地开发时使用 build，生产环境使用 image
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
